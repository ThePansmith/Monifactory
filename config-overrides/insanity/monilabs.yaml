values:
  # The exponent used each time the Omnic Synthesizer performs an operation.
  omnicSynthesizerExponent: 1.557

  # Whether the microminer is returned upon a microverse reaching zero integrity.
  microminerReturnedOnZeroIntegrity: true

  # Force pride month easter eggs regardless of time of year
  forcePrideMonth: false

  # The efficiency multiplier for the Sculk Vat. Would make it this many times less efficient at empty/full compared to half.
  sculkVatEfficiencyMultiplier: 33.0

  # Fluid ID for Liquid XP for the Sculk Vat.
  sculkVatExperienceFluidID: enderio:xp_juice

  # Whether to include the hostile microverse tooltip for the microverse type sensor hatch.
  hostileMicroverseTooltip: true

  # Passive decay rate for hostile microverses.
  hostileDecayRate: 20

  # Whether to enable changes related to Complex Microverses.
  doComplexMicroverses: true

  # Passive decay rate for abyssal microverses. Abyssal is a Complex Microverse.
  abyssalDecayRate: 50

  # Number of ticks between Virtual Particle Synthesizer noise steps. Default value is 40t (2s)
  # Most values will change after a single interaction. This can put time pressure on players.
  # It takes an average of 70 steps before every number is visited at least once. (2m20s at default)
  # Bad luck protection will kick in after 500-750 steps without covering a value. (~17-25min at default)
  virtualParticleSynthesisRefreshDelay: 40

